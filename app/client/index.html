<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CORTEX - Local LLM Studio</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-shell">
    <!-- Sidebar: conversations -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="brand">
          <div class="brand-title">CORTEX</div>
          <div class="brand-subtitle">Local LLM Workspace</div>
        </div>
        <button id="newChatBtn" class="sidebar-button" type="button">New chat</button>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-label">Conversations</div>
        <ul id="conversationList" class="conversation-list"></ul>
      </div>
    </aside>

    <!-- Main: chat -->
    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <label for="modelSelect" class="topbar-label">Model</label>
          <select id="modelSelect" class="topbar-select">
            <option value="">Loading models...</option>
          </select>
        </div>
        <div id="connectionStatus" class="status-indicator disconnected">Offline</div>
      </header>

      <section class="chat">
        <div id="chatMessages" class="chat-messages"></div>

        <div class="chat-input-area">
          <textarea
            id="messageInput"
            placeholder="Type your message..."
            rows="3"
          ></textarea>
          <label class="reasoning-toggle" title="Toggle reasoning-style explanations">
            <input id="reasoningToggle" type="checkbox" aria-label="Reasoning" />
            <span class="reasoning-slider" aria-hidden="true"></span>
            <span class="reasoning-text">Reasoning</span>
          </label>
          <button id="sendBtn" class="send-button">Send</button>
        </div>
      </section>
    </main>
  </div>

  <!-- Script -->
  <script src="https://cdn.jsdelivr.net/npm/marked@18.0.2/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.4.0/dist/purify.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
